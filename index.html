<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Водій у дорозі</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const driverId = params.get('driver_id');

        if (!driverId) {
            alert('Невідомий водій');
            throw new Error('Driver ID missing');
        }

        // Тёмная карта (CartoDB Dark Matter)
        const map = L.map('map').setView([46.0, 30.0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Иконка машинки
        const carIcon = L.divIcon({
            html: '🚗',
            className: 'car-icon',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const driverMarker = L.marker([0, 0], { icon: carIcon }).addTo(map);
        let firstUpdate = true;

        async function updatePosition() {
            try {
                const response = await fetch(`https://linguist-sabbath-smitten.ngrok-free.dev/get_driver_location?driver_id=${driverId}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                if (data.lat && data.lon) {
                    const latlng = [data.lat, data.lon];
                    driverMarker.setLatLng(latlng);
                    if (firstUpdate) {
                        map.setView(latlng, 15);
                        firstUpdate = false;
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        setInterval(updatePosition, 5000);
        updatePosition();
    </script>
</body>
</html>
