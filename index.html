<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Водій у дорозі</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Получаем driver_id из URL (?driver_id=...)
        const params = new URLSearchParams(window.location.search);
        const driverId = params.get('driver_id');

        if (!driverId) {
            alert('Невідомий водій');
            throw new Error('Driver ID missing');
        }

        // Инициализация карты (центр можно будет сместить после получения координат)
        const map = L.map('map').setView([46.0, 30.0], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OSM'
        }).addTo(map);

        const driverMarker = L.marker([0, 0]).addTo(map);
        let firstUpdate = true;

        async function updatePosition() {
            try {
                const response = await fetch(`https://5e683e31bd8a4c.lhr.life/get_driver_location?driver_id=${driverId}`);
                const data = await response.json();
                if (data.lat && data.lon) {
                    const latlng = [data.lat, data.lon];
                    driverMarker.setLatLng(latlng);
                    if (firstUpdate) {
                        map.setView(latlng, 15);
                        firstUpdate = false;
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Обновляемся каждые 5 секунд
        setInterval(updatePosition, 5000);
        updatePosition();
    </script>
</body>
</html>
